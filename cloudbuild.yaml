steps:
  # ── Step 1: Build backend image ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - 'gcr.io/$PROJECT_ID/smartvenue-backend:$COMMIT_SHA'
      - -t
      - 'gcr.io/$PROJECT_ID/smartvenue-backend:latest'
      - ./backend
    id: build-backend

  # ── Step 2: Push backend image ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/smartvenue-backend'
    waitFor: ['build-backend']
    id: push-backend

  # ── Step 3: Deploy backend to Cloud Run ────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - smartvenue-backend
      - '--image=gcr.io/$PROJECT_ID/smartvenue-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=5'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=300'
      - '--set-env-vars=NODE_ENV=production,JWT_EXPIRY=7d'
    waitFor: ['push-backend']
    id: deploy-backend

  # ── Step 4: Get backend URL ─────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$(gcloud run services describe smartvenue-backend \
          --region=us-central1 --format='value(status.url)')
        echo "Backend URL: $$BACKEND_URL"
        echo "$$BACKEND_URL" > /workspace/backend_url.txt
    waitFor: ['deploy-backend']
    id: get-backend-url

  # ── Step 5: Build frontend image with backend URL baked in ─────────────────
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        docker build \
          --build-arg NEXT_PUBLIC_API_URL="$$BACKEND_URL" \
          -t gcr.io/$PROJECT_ID/smartvenue-frontend:$COMMIT_SHA \
          -t gcr.io/$PROJECT_ID/smartvenue-frontend:latest \
          ./frontend
    waitFor: ['get-backend-url']
    id: build-frontend

  # ── Step 6: Push frontend image ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/smartvenue-frontend'
    waitFor: ['build-frontend']
    id: push-frontend

  # ── Step 7: Deploy frontend to Cloud Run ───────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        gcloud run deploy smartvenue-frontend \
          --image=gcr.io/$PROJECT_ID/smartvenue-frontend:$COMMIT_SHA \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --min-instances=1 \
          --max-instances=5 \
          --memory=512Mi \
          --cpu=1 \
          --timeout=300 \
          --set-env-vars="NODE_ENV=production,NEXT_PUBLIC_API_URL=$$BACKEND_URL"
    waitFor: ['push-frontend']
    id: deploy-frontend

images:
  - 'gcr.io/$PROJECT_ID/smartvenue-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/smartvenue-backend:latest'
  - 'gcr.io/$PROJECT_ID/smartvenue-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/smartvenue-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
