# ================================================================
# SmartVenue AI — Cloud Build pipeline (single container)
# ----------------------------------------------------------------
# Builds ONE image from the root Dockerfile, pushes it to GCR,
# and deploys it to Cloud Run.
#
# Trigger:  gcloud builds submit --config cloudbuild.yaml .
# Manual:   see deploy-cloudrun.ps1 for one-command deploy
# ================================================================

steps:
  # ── Step 1: Build the monorepo image ───────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - 'gcr.io/$PROJECT_ID/smartvenue:$COMMIT_SHA'
      - -t
      - 'gcr.io/$PROJECT_ID/smartvenue:latest'
      # Root Dockerfile — builds both Next.js frontend and Express backend
      - .
    id: build-image

  # ── Step 2: Push image to Google Container Registry ────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/smartvenue'
    waitFor: ['build-image']
    id: push-image

  # ── Step 3: Deploy to Cloud Run ────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - smartvenue
      - '--image=gcr.io/$PROJECT_ID/smartvenue:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=300'
      - '--port=8080'
      # Session affinity pins each browser client to the same instance,
      # which is required for Socket.IO WebSocket connections to work correctly.
      - '--session-affinity'
      # JWT_SECRET must be set via Secret Manager or manually after first deploy:
      #   gcloud run services update smartvenue --region=us-central1 \
      #     --set-env-vars="JWT_SECRET=<your-secret>"
      - '--set-env-vars=NODE_ENV=production,JWT_EXPIRY=7d,FRONTEND_URL=same-origin'
    waitFor: ['push-image']
    id: deploy

images:
  - 'gcr.io/$PROJECT_ID/smartvenue:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/smartvenue:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
